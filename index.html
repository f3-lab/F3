<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F3 FOOD</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
font-family: Arial, sans-serif;
background:#f7f7f7;
padding:15px;
}

h1{
text-align:center;
}

.product{
background:white;
padding:10px;
margin:10px 0;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.product img{
width:100%;
border-radius:10px;
margin-bottom:10px;
}

.description{
font-size:14px;
color:#555;
margin-bottom:5px;
}

button{
background:#27ae60;
color:white;
border:none;
padding:10px;
border-radius:8px;
width:100%;
margin-top:5px;
font-size:16px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
}

.cart{
margin-top:20px;
background:white;
padding:10px;
border-radius:10px;
}
</style>
</head>

<body>

<h1>🌿 F3 FOOD</h1>

<div class="product">
<img src="https://raw.githubusercontent.com/f3-lab/F3/main/IMG_8516.webp">
<h3>Холодец с хреном и горчицей</h3>

<p class="description">
Состав: говядина, свинина, курица<br>
Вес: 400 г
</p>

<p>100 R$</p>
<button onclick="addToCart('Холодец с хреном и горчицей',100)">Добавить</button>
</div>

<div class="product">
<img src="https://raw.githubusercontent.com/f3-lab/F3/main/EB0321F8-F6EB-4AD5-BAF0-617B03F5FA98.png">
<h3>Буженина</h3>

<p class="description">
Состав: свинина<br>
Вес: 200 г
</p>

<p>120 R$</p>
<button onclick="addToCart('Буженина',120)">Добавить</button>
</div>

<div class="product">
<img src="https://raw.githubusercontent.com/f3-lab/F3/main/0F4A5B09-9721-47C9-9298-EF8656A2669D.png">
<h3>Лосось с/с</h3>

<p class="description">
Состав: лосось слабосолёный<br>
Вес: 120 г
</p>

<p>100 R$</p>
<button onclick="addToCart('Лосось с/с',100)">Добавить</button>
</div>

<div class="cart">
<h3>Корзина</h3>
<div id="cart"></div>
<p><strong>Итого: <span id="total">0</span> R$</strong></p>

<input id="phone" placeholder="Телефон">
<input id="address" placeholder="Адрес доставки">

<button onclick="sendOrder()">Сделать заказ</button>
</div>

<script>

const tg = window.Telegram.WebApp;
tg.expand();

let cart = [];
let total = 0;
let userData = tg.initDataUnsafe.user || {};

function addToCart(name, price){

let existing = cart.find(item => item.name === name);

if(existing){
existing.qty += 1;
}else{
cart.push({name, price, qty:1});
}

total += price;
renderCart();
}

function renderCart(){

let cartDiv = document.getElementById("cart");
cartDiv.innerHTML = "";

cart.forEach(item=>{
cartDiv.innerHTML += `
<p>${item.name} x${item.qty} = ${item.price * item.qty} R$</p>
`;
});

document.getElementById("total").innerText = total;
}

function sendOrder(){

let phone = document.getElementById("phone").value;
let address = document.getElementById("address").value;

if(cart.length === 0){
alert("Корзина пустая");
return;
}

if(phone === "" || address === ""){
alert("Заполните телефон и адрес");
return;
}

let itemsText = "";
cart.forEach(item => {
itemsText += `${item.name} x${item.qty} = ${item.price * item.qty} R$\n`;
});

let text =
`🥟 Новый заказ

👤 ${userData.first_name || ""} @${userData.username || ""}
📱 ${phone}
📍 ${address}

${itemsText}
💰 Итого: ${total} R$`;

let url = "https://t.me/kirillvist?text=" + encodeURIComponent(text);

if (tg && tg.openTelegramLink) {
    tg.openTelegramLink(url);
} else {
    window.open(url, "_blank");
}

}

</script>

</body>
</html>
