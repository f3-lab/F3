<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FLORIPA FAMILY FOOD</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;900&display=swap" rel="stylesheet">

<style>

body{
font-family:'Montserrat',Arial,sans-serif;
background:#f7f7f7;
padding:15px;
margin:0;
}

.header-logo{
width:100%;
border-radius:14px;
margin-bottom:18px;
}

.product{
background:white;
padding:14px;
margin:14px 0;
border-radius:12px;
box-shadow:0 3px 8px rgba(0,0,0,0.08);
}

.product img{
width:100%;
border-radius:10px;
margin-bottom:10px;
}

.product h3{
margin:6px 0;
}

.description{
font-size:14px;
color:#555;
margin-bottom:6px;
}

.price{
font-weight:700;
margin-bottom:8px;
}

button{
background:#27ae60;
color:white;
border:none;
padding:12px;
border-radius:10px;
width:100%;
margin-top:6px;
font-size:16px;
cursor:pointer;
}

.sauce-button{
background:#f39c12;
}

.mustard{
background:#f1c40f;
color:black;
}

.adjika{
background:#e74c3c;
}

.sauces{
display:none;
margin-top:8px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
}

.cart{
margin-top:25px;
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 3px 8px rgba(0,0,0,0.08);
}

.total{
font-size:18px;
font-weight:700;
margin-top:10px;
}

</style>

</head>

<body>

<img class="header-logo" src="https://raw.githubusercontent.com/f3-lab/F3/main/IMG_8224.jpeg">

<div class="product">

<img src="https://raw.githubusercontent.com/f3-lab/F3/main/IMG_8516.webp">

<h3>Холодец</h3>

<p class="description">
Состав: говядина, свинина, курица<br>
Вес: 400 г
</p>

<p class="price">100 R$</p>

<button onclick="addToCart('Холодец',100)">Добавить</button>

<button class="sauce-button" onclick="toggleSauces('sauce1')">
Соусы
</button>

<div class="sauces" id="sauce1">

<button class="mustard" onclick="addToCart('Русская горчица',15)">
Русская горчица +15 R$
</button>

</div>

</div>


<div class="product">

<img src="https://raw.githubusercontent.com/f3-lab/F3/main/EB0321F8-F6EB-4AD5-BAF0-617B03F5FA98.png">

<h3>Буженина</h3>

<p class="description">
Состав: свинина<br>
Вес: 200 г
</p>

<p class="price">120 R$</p>

<button onclick="addToCart('Буженина',120)">Добавить</button>

<button class="sauce-button" onclick="toggleSauces('sauce2')">
Соусы
</button>

<div class="sauces" id="sauce2">

<button class="mustard" onclick="addToCart('Русская горчица',15)">
Русская горчица +15 R$
</button>

</div>

</div>


<div class="product">

<img src="https://raw.githubusercontent.com/f3-lab/F3/main/0F4A5B09-9721-47C9-9298-EF8656A2669D.png">

<h3>Лосось с/с</h3>

<p class="description">
Состав: слабосолёный лосось<br>
Вес: 120 г
</p>

<p class="price">100 R$</p>

<button onclick="addToCart('Лосось с/с',100)">Добавить</button>

</div>


<div class="product">

<img src="https://raw.githubusercontent.com/f3-lab/F3/main/F7DADF7E-364E-463B-9F34-85EE82689F5E.jpeg">

<h3>Шашлык</h3>

<p class="description">
Состав: свинина<br>
Вес: 200 г
</p>

<p class="price">120 R$</p>

<button onclick="addToCart('Шашлык',120)">Добавить</button>

<button class="sauce-button" onclick="toggleSauces('sauce3')">
Соусы
</button>

<div class="sauces" id="sauce3">

<button class="adjika" onclick="addToCart('Аджика',15)">
Аджика +15 R$
</button>

</div>

</div>


<div class="cart">

<h3>Корзина</h3>

<div id="cart"></div>

<p class="total">
Итого: <span id="total">0</span> R$
</p>

<input id="phone" placeholder="Телефон">

<input id="address" placeholder="Адрес доставки">

<button onclick="sendOrder()">Сделать заказ</button>

</div>


<script>

const tg = window.Telegram.WebApp;
tg.expand();

let cart=[];
let total=0;

let userData = tg.initDataUnsafe.user || {};

function toggleSauces(id){

let block=document.getElementById(id);

if(block.style.display==="block"){
block.style.display="none";
}else{
block.style.display="block";
}

}

function addToCart(name,price){

let existing=cart.find(item=>item.name===name);

if(existing){
existing.qty+=1;
}else{
cart.push({name,price,qty:1});
}

total+=price;

renderCart();

}

function renderCart(){

let cartDiv=document.getElementById("cart");

cartDiv.innerHTML="";

cart.forEach(item=>{

cartDiv.innerHTML+=
"<p>"+item.name+" x"+item.qty+" = "+(item.price*item.qty)+" R$</p>";

});

document.getElementById("total").innerText=total;

}

function sendOrder(){

let phone=document.getElementById("phone").value;
let address=document.getElementById("address").value;

if(cart.length===0){
alert("Корзина пустая");
return;
}

if(phone===""||address===""){
alert("Введите телефон и адрес");
return;
}

let itemsText="";

cart.forEach(item=>{
itemsText+=item.name+" x"+item.qty+" = "+(item.price*item.qty)+" R$\n";
});

let text=
"🥟 Новый заказ\n\n"+
"👤 "+(userData.first_name||"")+" @"+(userData.username||"")+"\n\n"+
"📱 "+phone+"\n\n"+
"📍 "+address+"\n\n"+
itemsText+
"\n💰 Итого: "+total+" R$";

let url="https://t.me/kirillvist?text="+encodeURIComponent(text);

if(tg && tg.openTelegramLink){
tg.openTelegramLink(url);
}else{
window.open(url,"_blank");
}

}

</script>

</body>
</html>
