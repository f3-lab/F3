<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FLORIPA FAMILY FOOD</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>

body{
font-family:'Montserrat',sans-serif;
background:#f7f7f7;
margin:0;
padding:15px;
}

.header-logo{
width:100%;
border-radius:14px;
margin-bottom:15px;
}

/* tabs */

.tabs{
display:flex;
gap:10px;
margin-bottom:15px;
}

.tab{
flex:1;
padding:12px;
border:none;
border-radius:10px;
background:#e0e0e0;
font-weight:700;
cursor:pointer;
}

.tab.active{
background:#ff7a00;
color:white;
}

/* cards */

.product{
background:white;
padding:14px;
margin-bottom:14px;
border-radius:12px;
box-shadow:0 3px 8px rgba(0,0,0,0.08);
}

.product img{
width:100%;
border-radius:10px;
margin-bottom:10px;
}

.description{
font-size:14px;
color:#555;
}

.price{
font-weight:700;
margin-top:6px;
}

button{
border:none;
padding:10px;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.qty{
display:flex;
gap:10px;
margin-top:8px;
}

.qty button{
flex:1;
background:#ddd;
}

.sauce-btn{
background:#ff7a00;
color:white;
width:100%;
margin-top:6px;
}

.mustard{
background:#f1c40f;
color:black;
width:100%;
}

.adjika{
background:#e74c3c;
color:white;
width:100%;
}

.sauces{
display:none;
margin-top:6px;
}

.menu{
display:none;
}

.menu.active{
display:block;
}

/* cart */

.cart-bar{
position:fixed;
bottom:0;
left:0;
right:0;
background:#27ae60;
color:white;
padding:16px;
text-align:center;
font-weight:700;
font-size:18px;
cursor:pointer;
}

.cart-panel{
display:none;
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
padding:20px;
border-radius:20px 20px 0 0;
max-height:70vh;
overflow:auto;
box-shadow:0 -5px 15px rgba(0,0,0,0.2);
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
}

.total{
font-size:18px;
font-weight:700;
margin-top:10px;
}

.order-btn{
background:#27ae60;
color:white;
width:100%;
margin-top:10px;
}

</style>

</head>

<body>

<img class="header-logo" src="https://raw.githubusercontent.com/f3-lab/F3/main/IMG_8224.jpeg">

<div class="tabs">
<button class="tab active" onclick="switchMenu('home',this)">🍽 Домашнее меню</button>
<button class="tab" onclick="switchMenu('buffet',this)">🥂 Фуршетное меню</button>
</div>

<div id="home" class="menu active">

<div class="product">
<img src="https://raw.githubusercontent.com/f3-lab/F3/main/IMG_8516.webp">
<h3>Холодец</h3>
<p class="description">400 г</p>
<p class="price">100 R$</p>

<div class="qty">
<button onclick="addToCart('Холодец',100)">+</button>
<button onclick="removeItem('Холодец',100)">−</button>
</div>

<button class="sauce-btn" onclick="toggleSauces('s1')">🌶 Соусы</button>

<div id="s1" class="sauces">
<button class="mustard" onclick="addToCart('Русская горчица',15)">Русская горчица +15</button>
</div>
</div>

<div class="product">
<img src="https://raw.githubusercontent.com/f3-lab/F3/main/EB0321F8-F6EB-4AD5-BAF0-617B03F5FA98.png">
<h3>Буженина</h3>
<p class="price">120 R$</p>

<div class="qty">
<button onclick="addToCart('Буженина',120)">+</button>
<button onclick="removeItem('Буженина',120)">−</button>
</div>

<button class="sauce-btn" onclick="toggleSauces('s2')">🌶 Соусы</button>

<div id="s2" class="sauces">
<button class="mustard" onclick="addToCart('Русская горчица',15)">Русская горчица +15</button>
</div>
</div>

<div class="product">
<img src="https://raw.githubusercontent.com/f3-lab/F3/main/0F4A5B09-9721-47C9-9298-EF8656A2669D.png">
<h3>Лосось с/с</h3>
<p class="price">100 R$</p>

<div class="qty">
<button onclick="addToCart('Лосось',100)">+</button>
<button onclick="removeItem('Лосось',100)">−</button>
</div>
</div>

<div class="product">
<img src="https://raw.githubusercontent.com/f3-lab/F3/main/F7DADF7E-364E-463B-9F34-85EE82689F5E.jpeg">
<h3>Шашлык</h3>
<p class="price">120 R$</p>

<div class="qty">
<button onclick="addToCart('Шашлык',120)">+</button>
<button onclick="removeItem('Шашлык',120)">−</button>
</div>

<button class="sauce-btn" onclick="toggleSauces('s3')">🌶 Соусы</button>

<div id="s3" class="sauces">
<button class="adjika" onclick="addToCart('Аджика',15)">Аджика +15</button>
</div>
</div>

</div>

<div id="buffet" class="menu">

<div class="product">
<img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Canape.jpg">
<h3>Канапе сет</h3>
<p class="description">20 шт</p>
<p class="price">120 R$</p>

<div class="qty">
<button onclick="addToCart('Канапе 20',120)">+</button>
<button onclick="removeItem('Канапе 20',120)">−</button>
</div>
</div>

<div class="product">
<h3>Канапе сет</h3>
<p class="description">40 шт</p>
<p class="price">220 R$</p>

<div class="qty">
<button onclick="addToCart('Канапе 40',220)">+</button>
<button onclick="removeItem('Канапе 40',220)">−</button>
</div>
</div>

<div class="product">
<h3>Канапе сет</h3>
<p class="description">60 шт</p>
<p class="price">300 R$</p>

<div class="qty">
<button onclick="addToCart('Канапе 60',300)">+</button>
<button onclick="removeItem('Канапе 60',300)">−</button>
</div>
</div>

</div>

<div class="cart-bar" onclick="openCart()">
🛒 Корзина • <span id="total">0</span> R$
</div>

<div class="cart-panel" id="cartPanel">

<h3>Корзина</h3>

<div id="cart"></div>

<p class="total">Итого: <span id="total2">0</span> R$</p>

<input id="phone" placeholder="Телефон">
<input id="address" placeholder="Адрес доставки">

<button class="order-btn" onclick="sendOrder()">Сделать заказ</button>

</div>

<script>

const tg = window.Telegram.WebApp;
tg.expand();

let cart=[];
let total=0;

function switchMenu(menu,btn){
document.querySelectorAll('.menu').forEach(m=>m.classList.remove('active'));
document.getElementById(menu).classList.add('active');
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
btn.classList.add('active');
}

function toggleSauces(id){
let s=document.getElementById(id);
s.style.display=s.style.display==="block"?"none":"block";
}

function addToCart(name,price){
let item=cart.find(i=>i.name===name);
if(item){item.qty++}else{cart.push({name,price,qty:1})}
total+=price;
renderCart();
}

function removeItem(name,price){
let item=cart.find(i=>i.name===name);
if(!item)return;
item.qty--;
total-=price;
if(item.qty<=0){cart=cart.filter(i=>i.name!==name)}
renderCart();
}

function renderCart(){
let c=document.getElementById("cart");
c.innerHTML="";
cart.forEach(i=>{
c.innerHTML+="<p>"+i.name+" x"+i.qty+" = "+(i.price*i.qty)+" R$</p>";
});
document.getElementById("total").innerText=total;
document.getElementById("total2").innerText=total;
}

function openCart(){
let p=document.getElementById("cartPanel");
p.style.display=p.style.display==="block"?"none":"block";
}

function sendOrder(){
let phone=document.getElementById("phone").value;
let address=document.getElementById("address").value;

let items="";
cart.forEach(i=>{
items+=i.name+" x"+i.qty+" = "+(i.price*i.qty)+" R$\n";
});

let text="🥟 Новый заказ\n\n📱 "+phone+"\n📍 "+address+"\n\n"+items+"\n💰 Итого: "+total+" R$";

let url="https://t.me/kirillvist?text="+encodeURIComponent(text);

tg.openTelegramLink(url);
}

</script>

</body>
</html>
