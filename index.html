<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F3 FOOD</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #111;
    color: white;
}

header {
    padding: 20px;
    text-align: center;
    font-size: 22px;
    font-weight: 600;
}

.menu {
    padding: 15px;
}

.item {
    background: #1e1e1e;
    padding: 15px;
    margin-bottom: 12px;
    border-radius: 12px;
}

.item h3 {
    margin: 0 0 6px 0;
}

.price {
    color: #00c853;
    font-weight: bold;
}

button {
    margin-top: 10px;
    padding: 10px;
    width: 100%;
    border-radius: 8px;
    border: none;
    background: #ff6f00;
    color: white;
    font-weight: bold;
}
</style>
</head>

<body>

<header>🥟 F3 FOOD — Замороженные блюда</header>

<div class="menu" id="menu"></div>

<script>

const products = [
    {name: "Пельмени домашние", price: 35},
    {name: "Вареники с картофелем", price: 30},
    {name: "Вареники с вишней", price: 32},
    {name: "Хинкали", price: 40},
    {name: "Манты", price: 38},
    {name: "Голубцы", price: 36},
    {name: "Котлеты куриные", price: 34},
    {name: "Фрикадельки говяжьи", price: 37},
    {name: "Сырники", price: 28},
    {name: "Блины с мясом", price: 33},
    {name: "Чебуреки", price: 29}
];

const menu = document.getElementById("menu");

products.forEach(product => {
    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
        <h3>${product.name}</h3>
        <div class="price">${product.price} R$ / кг</div>
        <button onclick="order('${product.name}', ${product.price})">
            Добавить в заказ
        </button>
    `;

    menu.appendChild(div);
});

function order(name, price) {
    const tg = window.Telegram.WebApp;
    tg.sendData(JSON.stringify({
        product: name,
        price: price
    }));
    tg.close();
}

</script>

</body>
</html>
