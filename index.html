<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FLORIPA FAMILY FOOD</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;900&display=swap" rel="stylesheet">

<style>

body{
font-family:'Montserrat',Arial,sans-serif;
background:#f7f7f7;
padding:15px;
margin:0;
}

.header-logo{
width:100%;
border-radius:14px;
margin-bottom:18px;
}

/* вкладки */

.tabs{
display:flex;
gap:10px;
margin-bottom:15px;
}

.tab{
flex:1;
padding:12px;
border:none;
border-radius:10px;
background:#e0e0e0;
font-weight:700;
cursor:pointer;
}

.tab.active{
background:#ff7a00;
color:white;
}

/* карточки */

.product{
background:white;
padding:14px;
margin:14px 0;
border-radius:12px;
box-shadow:0 3px 8px rgba(0,0,0,0.08);
}

.product img{
width:100%;
border-radius:10px;
margin-bottom:10px;
}

.description{
font-size:14px;
color:#555;
margin-bottom:6px;
}

.price{
font-weight:700;
margin-bottom:8px;
}

button{
background:#27ae60;
color:white;
border:none;
padding:12px;
border-radius:10px;
width:100%;
margin-top:6px;
font-size:16px;
cursor:pointer;
}

.sauce-button{
background:#ff7a00;
font-weight:700;
}

.mustard{
background:#f1c40f;
color:black;
}

.adjika{
background:#e74c3c;
}

.sauces{
display:none;
margin-top:8px;
}

.menu{
display:none;
}

.menu.active{
display:block;
}

/* корзина */

.cart{
margin-top:25px;
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 3px 8px rgba(0,0,0,0.08);
}

.total{
font-size:18px;
font-weight:700;
margin-top:10px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
}

</style>

</head>

<body>

<img class="header-logo" src="https://raw.githubusercontent.com/f3-lab/F3/main/IMG_8224.jpeg">

<div class="tabs">

<button class="tab active" onclick="switchMenu('home',this)">
🍽 Домашнее меню
</button>

<button class="tab" onclick="switchMenu('buffet',this)">
🥂 Фуршетное меню
</button>

</div>


<!-- ДОМАШНЕЕ МЕНЮ -->

<div id="home" class="menu active">

<div class="product">

<img src="https://raw.githubusercontent.com/f3-lab/F3/main/IMG_8516.webp">

<h3>Холодец</h3>

<p class="description">
Говядина, свинина, курица • 400 г
</p>

<p class="price">100 R$</p>

<button onclick="addToCart('Холодец',100)">Добавить</button>

<button id="btn1" class="sauce-button" onclick="toggleSauces('s1','btn1')">
🌶 Соусы ▼
</button>

<div class="sauces" id="s1">

<button class="mustard" onclick="addToCart('Русская горчица',15)">
Русская горчица +15 R$
</button>

</div>

</div>


<div class="product">

<img src="https://raw.githubusercontent.com/f3-lab/F3/main/EB0321F8-F6EB-4AD5-BAF0-617B03F5FA98.png">

<h3>Буженина</h3>

<p class="description">
Свинина • 200 г
</p>

<p class="price">120 R$</p>

<button onclick="addToCart('Буженина',120)">Добавить</button>

<button id="btn2" class="sauce-button" onclick="toggleSauces('s2','btn2')">
🌶 Соусы ▼
</button>

<div class="sauces" id="s2">

<button class="mustard" onclick="addToCart('Русская горчица',15)">
Русская горчица +15 R$
</button>

</div>

</div>


<div class="product">

<img src="https://raw.githubusercontent.com/f3-lab/F3/main/0F4A5B09-9721-47C9-9298-EF8656A2669D.png">

<h3>Лосось с/с</h3>

<p class="description">
120 г
</p>

<p class="price">100 R$</p>

<button onclick="addToCart('Лосось',100)">Добавить</button>

</div>


<div class="product">

<img src="https://raw.githubusercontent.com/f3-lab/F3/main/F7DADF7E-364E-463B-9F34-85EE82689F5E.jpeg">

<h3>Шашлык</h3>

<p class="description">
Свинина • 200 г
</p>

<p class="price">120 R$</p>

<button onclick="addToCart('Шашлык',120)">Добавить</button>

<button id="btn3" class="sauce-button" onclick="toggleSauces('s3','btn3')">
🌶 Соусы ▼
</button>

<div class="sauces" id="s3">

<button class="adjika" onclick="addToCart('Аджика',15)">
Аджика +15 R$
</button>

</div>

</div>

</div>



<!-- ФУРШЕТНОЕ МЕНЮ -->

<div id="buffet" class="menu">

<div class="product">

<img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Canape.jpg">

<h3>Канапе</h3>

<p class="description">
Фуршетные мини-закуски
</p>

<p class="price">120 R$ / сет</p>

<button onclick="addToCart('Канапе сет',120)">
Добавить
</button>

</div>

</div>



<!-- КОРЗИНА -->

<div class="cart">

<h3>Корзина</h3>

<div id="cart"></div>

<p class="total">
Итого: <span id="total">0</span> R$
</p>

<input id="phone" placeholder="Телефон">
<input id="address" placeholder="Адрес доставки">

<button onclick="sendOrder()">Сделать заказ</button>

</div>



<script>

const tg = window.Telegram.WebApp;
tg.expand();

let cart=[];
let total=0;
let userData = tg.initDataUnsafe.user || {};

function switchMenu(menu,btn){

document.querySelectorAll('.menu').forEach(m=>{
m.classList.remove('active');
});

document.getElementById(menu).classList.add('active');

document.querySelectorAll('.tab').forEach(t=>{
t.classList.remove('active');
});

btn.classList.add('active');

}

function toggleSauces(id,btn){

let block=document.getElementById(id);
let button=document.getElementById(btn);

if(block.style.display==="block"){
block.style.display="none";
button.innerHTML="🌶 Соусы ▼";
}else{
block.style.display="block";
button.innerHTML="🌶 Соусы ▲";
}

}

function addToCart(name,price){

let existing=cart.find(i=>i.name===name);

if(existing){
existing.qty+=1;
}else{
cart.push({name,price,qty:1});
}

total+=price;

renderCart();

}

function renderCart(){

let cartDiv=document.getElementById("cart");

cartDiv.innerHTML="";

cart.forEach(item=>{
cartDiv.innerHTML+=
"<p>"+item.name+" x"+item.qty+" = "+(item.price*item.qty)+" R$</p>";
});

document.getElementById("total").innerText=total;

}

function sendOrder(){

let phone=document.getElementById("phone").value;
let address=document.getElementById("address").value;

if(cart.length===0){
alert("Корзина пустая");
return;
}

if(phone===""||address===""){
alert("Введите телефон и адрес");
return;
}

let items="";

cart.forEach(i=>{
items+=i.name+" x"+i.qty+" = "+(i.price*i.qty)+" R$\n";
});

let text=
"🥟 Новый заказ\n\n"+
"👤 "+(userData.first_name||"")+" @"+(userData.username||"")+"\n\n"+
"📱 "+phone+"\n\n"+
"📍 "+address+"\n\n"+
items+
"\n💰 Итого: "+total+" R$";

let url="https://t.me/kirillvist?text="+encodeURIComponent(text);

if(tg && tg.openTelegramLink){
tg.openTelegramLink(url);
}else{
window.open(url,"_blank");
}

}

</script>

</body>
</html>
