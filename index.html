<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FLORIPA FAMILY FOOD</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;900&display=swap" rel="stylesheet">

<style>

body{
font-family:'Montserrat',Arial,sans-serif;
background:#f7f7f7;
padding:15px;
margin:0;
}

.header-logo{
width:100%;
border-radius:14px;
margin-bottom:18px;
}

.tabs{
display:flex;
gap:10px;
margin-bottom:15px;
}

.tab{
flex:1;
padding:12px;
border:none;
border-radius:10px;
background:#e0e0e0;
font-weight:700;
cursor:pointer;
}

.tab.active{
background:#ff7a00;
color:white;
}

.product{
background:white;
padding:14px;
margin:14px 0;
border-radius:12px;
box-shadow:0 3px 8px rgba(0,0,0,0.08);
}

.product img{
width:100%;
border-radius:10px;
margin-bottom:10px;
}

.description{
font-size:14px;
color:#555;
margin-bottom:6px;
}

.price{
font-weight:700;
margin-bottom:8px;
}

button{
background:#27ae60;
color:white;
border:none;
padding:12px;
border-radius:10px;
width:100%;
margin-top:6px;
font-size:16px;
cursor:pointer;
}

.pix{
background:#009ee3;
font-weight:700;
}

.sauce-button{
background:#ff7a00;
font-weight:700;
}

.mustard{
background:#f1c40f;
color:black;
}

.adjika{
background:#e74c3c;
}

.sauces{
display:none;
margin-top:8px;
}

.menu{
display:none;
}

.menu.active{
display:block;
}

.cart{
margin-top:25px;
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 3px 8px rgba(0,0,0,0.08);
}

.total{
font-size:18px;
font-weight:700;
margin-top:10px;
}

.cart-item{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:8px;
}

.cart-controls button{
width:auto;
padding:6px 10px;
margin-left:4px;
font-size:14px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
}

</style>

</head>

<body>

<img class="header-logo" src="https://raw.githubusercontent.com/f3-lab/F3/main/IMG_8224.jpeg">

<div class="tabs">

<button class="tab active" onclick="switchMenu('home',this)">
🍽 Домашнее меню
</button>

<button class="tab" onclick="switchMenu('buffet',this)">
🥂 Фуршетное меню
</button>

</div>


<div id="home" class="menu active">

<div class="product">

<img src="https://raw.githubusercontent.com/f3-lab/F3/main/IMG_8516.webp">

<h3>Холодец</h3>

<p class="description">
Говядина, свинина, курица • 400 г
</p>

<p class="price">100 R$</p>

<button onclick="addToCart('Холодец',100)">Добавить</button>

</div>


<div class="product">

<img src="https://raw.githubusercontent.com/f3-lab/F3/main/EB0321F8-F6EB-4AD5-BAF0-617B03F5FA98.png">

<h3>Буженина</h3>

<p class="description">
Свинина • 200 г
</p>

<p class="price">120 R$</p>

<button onclick="addToCart('Буженина',120)">Добавить</button>

</div>


<div class="product">

<img src="https://raw.githubusercontent.com/f3-lab/F3/main/0F4A5B09-9721-47C9-9298-EF8656A2669D.png">

<h3>Лосось с/с</h3>

<p class="description">
Лосось слабосоленый • 120 г
</p>

<p class="price">100 R$</p>

<button onclick="addToCart('Лосось',100)">Добавить</button>

</div>


<div class="product">

<img src="https://raw.githubusercontent.com/f3-lab/F3/main/F7DADF7E-364E-463B-9F34-85EE82689F5E.jpeg">

<h3>Шашлык</h3>

<p class="description">
Свинина • 200 г
</p>

<p class="price">120 R$</p>

<button onclick="addToCart('Шашлык',120)">Добавить</button>

</div>

</div>


<div id="buffet" class="menu">

<div class="product">

<img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Canape.jpg">

<h3>Канапе</h3>

<p class="description">
Фуршетные мини-закуски
</p>

<p class="price">120 R$ / сет</p>

<button onclick="addToCart('Канапе сет',120)">
Добавить
</button>

</div>

</div>



<div class="cart">

<h3>Корзина</h3>

<div id="cart"></div>

<p class="total">
Итого: <span id="total">0</span> R$
</p>

<input id="phone" placeholder="Телефон">
<input id="address" placeholder="Адрес доставки">

<button class="pix" onclick="payPix()">
💳 Оплатить Pix
</button>

<button onclick="sendOrder()">
📩 Заказ без оплаты
</button>

</div>



<script>

const tg = window.Telegram.WebApp;
tg.expand();

let cart=[];

function switchMenu(menu,btn){

document.querySelectorAll('.menu').forEach(m=>{
m.classList.remove('active');
});

document.getElementById(menu).classList.add('active');

document.querySelectorAll('.tab').forEach(t=>{
t.classList.remove('active');
});

btn.classList.add('active');

}

function addToCart(name,price){

let existing=cart.find(i=>i.name===name);

if(existing){
existing.qty+=1;
}else{
cart.push({name,price,qty:1});
}

renderCart();

}

function renderCart(){

let cartDiv=document.getElementById("cart");
cartDiv.innerHTML="";

let total=0;

cart.forEach((item,index)=>{

total+=item.price*item.qty;

cartDiv.innerHTML+=`

<div class="cart-item">

<div>
${item.name} x${item.qty}
</div>

<div class="cart-controls">
<button onclick="itemMinus(${index})">➖</button>
<button onclick="itemPlus(${index})">➕</button>
<button onclick="removeItem(${index})">❌</button>
</div>

</div>

`;

});

document.getElementById("total").innerText=total;

}

function itemPlus(i){
cart[i].qty++;
renderCart();
}

function itemMinus(i){
cart[i].qty--;
if(cart[i].qty<=0){cart.splice(i,1);}
renderCart();
}

function removeItem(i){
cart.splice(i,1);
renderCart();
}


function payPix(){

if(cart.length===0){
alert("Корзина пустая");
return;
}

let total=0;
let items="";

cart.forEach(i=>{
total+=i.price*i.qty;
items+=i.name+" x"+i.qty+" | ";
});

let url="https://link.mercadopago.com.br/seulinkpix";

window.open(url,"_blank");

}

function sendOrder(){

let phone=document.getElementById("phone").value;
let address=document.getElementById("address").value;

let total=0;
let items="";

cart.forEach(i=>{
items+=i.name+" x"+i.qty+"\n";
total+=i.price*i.qty;
});

let text=
"Новый заказ\n\n"+
"Телефон: "+phone+"\n"+
"Адрес: "+address+"\n\n"+
items+
"\nИтого: "+total+" R$";

let url="https://t.me/kirillvist?text="+encodeURIComponent(text);

window.open(url,"_blank");

}

</script>

</body>
</html>
