<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Floripa Family Food</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Montserrat',sans-serif;
background:#f7f7f7;
color:#222;
}

.header{
background:white;
padding:20px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.header img{
max-width:220px;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.menu-title{
font-size:28px;
font-weight:700;
margin-bottom:20px;
}

.card{
background:white;
border-radius:16px;
overflow:hidden;
margin-bottom:24px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
transition:0.2s;
}

.card:hover{
transform:translateY(-4px);
}

.food-img{
width:100%;
height:260px;
object-fit:cover;
}

.card-body{
padding:18px;
}

.food-name{
font-size:22px;
font-weight:600;
margin-bottom:6px;
}

.food-desc{
font-size:14px;
color:#666;
margin-bottom:12px;
}

.price{
font-size:20px;
font-weight:700;
}

.topping{
margin-top:10px;
font-size:14px;
background:#f1f1f1;
padding:8px 10px;
border-radius:8px;
display:inline-block;
}

.footer{
text-align:center;
margin-top:30px;
font-size:13px;
color:#888;
}

</style>
</head>

<body>

<div class="header">
<img src="https://raw.githubusercontent.com/f3-lab/F3/main/IMG_8224.jpeg">
</div>

<div class="container">

<div class="menu-title">
Меню
</div>


<div class="card">

<img class="food-img" src="https://raw.githubusercontent.com/f3-lab/F3/main/F7DADF7E-364E-463B-9F34-85EE82689F5E.jpeg">

<div class="card-body">

<div class="food-name">
Шашлык
</div>

<div class="food-desc">
Свинина 200 г
</div>

<div class="price">
120 R$
</div>

</div>

</div>



<div class="card">

<img class="food-img" src="https://raw.githubusercontent.com/f3-lab/F3/main/kholodets.jpg">

<div class="card-body">

<div class="food-name">
Холодец
</div>

<div class="food-desc">
Традиционный домашний холодец
</div>

<div class="price">
90 R$
</div>

<div class="topping">
Топинг: Русская горчица +15 R$
</div>

</div>

</div>



<div class="footer">
Floripa Family Food
</div>

</div>

</body>
</html>
